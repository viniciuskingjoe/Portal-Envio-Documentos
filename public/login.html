<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — AKR Brands · Fluxo Fiscal</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2317211d'/%3E%3Cpath d='M19 15h20l8 8v26H19z' fill='none' stroke='white' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M39 15v10h8M25 34h16M25 42h12' fill='none' stroke='%236aa8f2' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #f4f6f5;
      color: #17231f;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px; padding: 24px;
    }
    .stack { width: 100%; max-width: 400px; }
    .akr-lockup { display: flex; align-items: center; gap: 13px; justify-content: center; margin-bottom: 22px; color: #14201c; }
    .akr-word { display: flex; align-items: center; gap: 12px; font-weight: 800; letter-spacing: .2em; font-size: 22px; }
    .akr-word .divider { width: 1px; height: 1.05em; background: currentColor; opacity: .4; }
    .akr-word .sub { font-weight: 300; letter-spacing: .34em; }
    .card { background: #fff; border-radius: 18px; box-shadow: 0 10px 30px rgba(20, 32, 28, .10), 0 2px 6px rgba(20,32,28,.06); border: 1px solid #e7ece9; padding: 32px 30px 28px; }
    .product { display: flex; align-items: center; gap: 11px; margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid #edf2f0; }
    .product .mark { width: 40px; height: 40px; border-radius: 11px; background: #17211d; display: grid; place-items: center; flex: none; }
    .product .mark svg { width: 22px; height: 22px; fill: none; stroke: #cddffb; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .product strong { display: block; font-size: 15px; color: #17211d; }
    .product span { font-size: 12px; color: #68766f; }
    h1 { font-size: 19px; margin: 0 0 4px; }
    .sub-text { margin: 0 0 20px; color: #68766f; font-size: 13px; }
    label { display: block; margin-bottom: 14px; }
    label span { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: #3a463f; }
    input { width: 100%; padding: 11px 12px; border: 1px solid #dce5e1; border-radius: 10px; font: inherit; color: #17231f; background: #f8faf9; }
    input:focus { outline: none; border-color: #3f8ae0; box-shadow: 0 0 0 3px rgba(63,138,224,.22); background: #fff; }
    button.primary { width: 100%; margin-top: 6px; padding: 12px; border: none; border-radius: 10px; background: #17211d; color: #fff; font: inherit; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    button.primary:hover { background: #000; }
    button.primary:disabled { opacity: .6; cursor: default; }
    .msg { display: none; margin: 0 0 16px; padding: 10px 12px; border-radius: 10px; font-size: 13px; }
    .msg.show { display: block; }
    .msg.error { background: #fde9e9; color: #a33; border: 1px solid #f4caca; }
    .msg.info { background: #eaf1fa; color: #2c5a92; border: 1px solid #cfe0f4; }
    .foot { margin-top: 18px; display: flex; align-items: flex-start; gap: 8px; color: #6b7772; font-size: 12px; }
    .foot svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex: none; margin-top: 1px; }
    .hidden { display: none !important; }
    .link { background: none; border: none; color: #17211d; font: inherit; font-weight: 600; cursor: pointer; padding: 0; }
    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: r .7s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="stack">
    <div class="akr-lockup">
      <div class="akr-word"><span>AKR</span><span class="divider"></span><span class="sub">BRANDS</span></div>
    </div>

    <div class="card">
      <div class="product">
        <div class="mark"><svg viewBox="0 0 32 32"><path d="M9 5h10l5 5v17H9z"/><path d="M19 5v7h5M13 17h7M13 22h5"/></svg></div>
        <div><strong>Fluxo Fiscal</strong><span>Envio e conferência de documentos</span></div>
      </div>

      <div class="msg error" id="error"></div>
      <div class="msg info" id="info"></div>

      <form id="auth-form">
        <h1 id="title">Entrar</h1>
        <p class="sub-text" id="subtitle">Use seu usuário do domínio e sua senha do sistema.</p>

        <label><span>Usuário</span>
          <input name="username" autocomplete="username" placeholder="usuario do domínio" required autofocus /></label>

        <!-- Login normal -->
        <label id="field-password"><span>Senha do sistema</span>
          <input name="password" type="password" autocomplete="current-password" /></label>

        <!-- Primeiro acesso (revelado quando o usuário ainda não existe) -->
        <div id="first-access" class="hidden">
          <label><span>Senha do domínio (AD)</span>
            <input name="adPassword" type="password" autocomplete="current-password" /></label>
          <label><span>Crie sua senha do sistema (mín. 6)</span>
            <input name="newPassword" type="password" autocomplete="new-password" minlength="6" /></label>
          <label><span>Repita a nova senha</span>
            <input name="confirm" type="password" autocomplete="new-password" minlength="6" /></label>
        </div>

        <button type="submit" class="primary" id="submit">Entrar</button>
        <p class="sub-text hidden" id="back-row" style="margin-top:14px;text-align:center;">
          <button type="button" class="link" id="back">Usar outro usuário</button>
        </p>
      </form>
    </div>

    <div class="foot">
      <svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      Identidade confirmada no Active Directory. No primeiro acesso você cria uma senha própria do sistema. Todas as ações são registradas em log de auditoria.
    </div>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const form = $('#auth-form'), submit = $('#submit'), errorBox = $('#error'), infoBox = $('#info');
    const firstAccess = $('#first-access'), fieldPassword = $('#field-password'), backRow = $('#back-row');
    let mode = 'login';

    const clearMsg = () => { errorBox.classList.remove('show'); infoBox.classList.remove('show'); };
    const showError = m => { clearMsg(); errorBox.textContent = m; errorBox.classList.add('show'); };
    const showInfo = m => { clearMsg(); infoBox.textContent = m; infoBox.classList.add('show'); };

    function setMode(next) {
      mode = next;
      const first = next === 'first';
      firstAccess.classList.toggle('hidden', !first);
      fieldPassword.classList.toggle('hidden', first);
      backRow.classList.toggle('hidden', !first);
      form.password.required = !first;
      form.username.readOnly = first;
      ['adPassword','newPassword','confirm'].forEach(n => form[n].required = first);
      $('#title').textContent = first ? 'Primeiro acesso' : 'Entrar';
      $('#subtitle').textContent = first
        ? 'Confirme sua senha do domínio e crie uma senha para este sistema. Você entrará como Conferente.'
        : 'Use seu usuário do domínio e sua senha do sistema.';
      submit.textContent = first ? 'Criar acesso e entrar' : 'Entrar';
      if (first) form.adPassword.focus();
    }

    $('#back').addEventListener('click', () => { form.reset(); clearMsg(); setMode('login'); form.username.focus(); });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMsg();
      const username = form.username.value.trim();
      submit.disabled = true;
      const spin = '<span class="spin"></span> ';

      try {
        if (mode === 'login') {
          submit.innerHTML = spin + 'Entrando…';
          const res = await fetch('/api/auth/login', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password: form.password.value }),
          });
          const data = await res.json();
          if (data.firstAccess) { submit.disabled = false; submit.textContent = 'Entrar'; setMode('first'); return showInfo('Primeiro acesso detectado. Confirme sua senha do domínio e crie uma senha própria.'); }
          if (!res.ok) throw new Error(data.error || 'Falha na autenticação.');
          window.location.href = '/';
        } else {
          if (form.newPassword.value !== form.confirm.value) { submit.disabled = false; return showError('As senhas não conferem.'); }
          submit.innerHTML = spin + 'Validando…';
          const res = await fetch('/api/auth/register', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, adPassword: form.adPassword.value, newPassword: form.newPassword.value }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Falha no cadastro.');
          window.location.href = '/';
        }
      } catch (err) {
        submit.disabled = false;
        submit.textContent = mode === 'first' ? 'Criar acesso e entrar' : 'Entrar';
        showError(err.message);
      }
    });
  </script>
</body>
</html>
