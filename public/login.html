<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Fluxo Fiscal</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23194f45'/%3E%3Cpath d='M19 15h20l8 8v26H19z' fill='none' stroke='white' stroke-width='4' stroke-linejoin='round'/%3E%3Cpath d='M39 15v10h8M25 34h16M25 42h12' fill='none' stroke='%2379d6c5' stroke-width='4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: radial-gradient(1200px 600px at 20% -10%, #1c5a4f, #123f37 60%);
      color: #17231f;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px; padding: 24px;
    }
    .card {
      width: 100%; max-width: 400px; background: #fff; border-radius: 18px;
      box-shadow: 0 24px 60px rgba(10, 30, 25, .35); padding: 34px 30px 30px;
    }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
    .brand-mark {
      width: 44px; height: 44px; border-radius: 12px; background: #194f45;
      display: grid; place-items: center; flex: none;
    }
    .brand-mark svg { width: 24px; height: 24px; fill: none; stroke: #79d6c5; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .brand strong { display: block; font-size: 16px; color: #123f37; }
    .brand span { font-size: 12px; color: #68766f; }
    h1 { font-size: 20px; margin: 0 0 4px; color: #17231f; }
    .sub { margin: 0 0 22px; color: #68766f; font-size: 13px; }
    label { display: block; margin-bottom: 14px; }
    label span { display: block; font-size: 12.5px; font-weight: 600; margin-bottom: 6px; color: #3a463f; }
    input {
      width: 100%; padding: 11px 12px; border: 1px solid #dce5e1; border-radius: 10px;
      font: inherit; color: #17231f; background: #f8faf9;
    }
    input:focus { outline: none; border-color: #54bda9; box-shadow: 0 0 0 3px rgba(84,189,169,.2); background: #fff; }
    button {
      width: 100%; margin-top: 6px; padding: 12px; border: none; border-radius: 10px;
      background: #194f45; color: #fff; font: inherit; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:hover { background: #123f37; }
    button:disabled { opacity: .6; cursor: default; }
    .error {
      display: none; margin: 0 0 16px; padding: 10px 12px; border-radius: 10px;
      background: #fde9e9; color: #a33; font-size: 13px; border: 1px solid #f4caca;
    }
    .error.show { display: block; }
    .foot { margin-top: 20px; display: flex; align-items: center; gap: 8px; color: #68766f; font-size: 12px; }
    .foot svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; flex: none; }
    .spin { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: r .7s linear infinite; }
    @keyframes r { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 32 32"><path d="M9 5h10l5 5v17H9z"/><path d="M19 5v7h5M13 17h7M13 22h5"/></svg></div>
      <div><strong>Fluxo Fiscal</strong><span>Gestão documental</span></div>
    </div>
    <h1>Entrar</h1>
    <p class="sub">Use seu usuário do domínio da empresa.</p>

    <div class="error" id="error"></div>

    <form id="login-form">
      <label>
        <span>Usuário</span>
        <input name="username" autocomplete="username" placeholder="usuario ou usuario@king.local" required autofocus />
      </label>
      <label>
        <span>Senha</span>
        <input name="password" type="password" autocomplete="current-password" required />
      </label>
      <button type="submit" id="submit">Entrar</button>
    </form>

    <div class="foot">
      <svg viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
      Acesso autenticado no Active Directory. Ações são registradas em log de auditoria.
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('error');
    const submit = document.getElementById('submit');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.remove('show');
      submit.disabled = true;
      submit.innerHTML = '<span class="spin"></span> Entrando…';
      const body = { username: form.username.value.trim(), password: form.password.value };
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Falha na autenticação.');
        window.location.href = '/';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.add('show');
        submit.disabled = false;
        submit.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
